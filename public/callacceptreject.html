<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Incoming Call - astroluna</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --brand-purple: #5c0874;
            --brand-light: #7a1f95;
            --accent-gold: #f59e0b;
            --secondary-bg: #1a0222;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Raleway', sans-serif;
            background: radial-gradient(circle at top, var(--brand-light) 0%, var(--secondary-bg) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow: hidden;
        }

        .call-container {
            text-align: center;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--brand-purple) 0%, var(--brand-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 56px;
            font-weight: 800;
            color: var(--accent-gold);
            border: 4px solid var(--glass-border);
            box-shadow: 0 0 30px rgba(92, 8, 116, 0.6);
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(1);
                box-shadow: 0 0 30px rgba(92, 8, 116, 0.6);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 50px rgba(92, 8, 116, 0.8);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 30px rgba(92, 8, 116, 0.6);
            }
        }

        .call-type {
            font-size: 14px;
            color: var(--accent-gold);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .caller-name {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .call-status {
            font-size: 16px;
            color: #10b981;
            margin-bottom: 50px;
            font-weight: 600;
        }

        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 20px;
        }

        .call-btn {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            transition: 0.3s;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .btn-accept {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .btn-accept:hover {
            transform: scale(1.15);
            box-shadow: 0 12px 35px rgba(16, 185, 129, 0.5);
        }

        .btn-reject {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .btn-reject:hover {
            transform: scale(1.15);
            box-shadow: 0 12px 35px rgba(239, 68, 68, 0.5);
        }

        .btn-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 12px;
            font-weight: 600;
        }

        .btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--glass-border);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .footer-info {
            margin-top: 30px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="call-container">
        <div class="avatar" id="avatar">?</div>
        <div class="call-type" id="callType">Incoming Call</div>
        <div class="caller-name" id="callerName">Loading...</div>
        <div class="call-status">📞 Incoming call...</div>

        <div class="buttons-container" id="buttonsContainer">
            <div class="btn-wrapper">
                <button class="call-btn btn-reject" id="btnReject" onclick="rejectCall()">
                    📵
                </button>
                <div class="btn-label">Reject</div>
            </div>
            <div class="btn-wrapper">
                <button class="call-btn btn-accept" id="btnAccept" onclick="acceptCall()">
                    📞
                </button>
                <div class="btn-label">Accept</div>
            </div>
        </div>

        <div class="connecting" id="connecting">
            <div class="spinner"></div>
            <p>Connecting...</p>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="footer-info">
            Support: kalpanajomr@gmail.com | 904785439<br>
            &copy; 2024 TAMIL ARGO INTERNATIONAL
        </div>
    </div>

    <audio id="ringtone" loop>
        <source src="sound.mpeg" type="audio/mpeg">
    </audio>

    <script>
        // Get call data from URL params
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('sessionId') || '';
        const callerName = urlParams.get('callerName') || 'Unknown Caller';
        const callType = urlParams.get('callType') || 'audio';
        const fromUserId = urlParams.get('fromUserId') || '';

        // Update UI
        document.getElementById('callerName').textContent = callerName;
        document.getElementById('avatar').textContent = callerName.charAt(0).toUpperCase();
        document.getElementById('callType').textContent =
            callType === 'video' ? '📹 Incoming Video Call' :
                callType === 'audio' ? '📞 Incoming Voice Call' :
                    '💬 Incoming Call';

        // Play ringtone
        const ringtone = document.getElementById('ringtone');
        ringtone.play().catch(e => console.log('Autoplay blocked:', e));

        // Connect to socket
        const socket = io();
        let userId = null;

        // Get user from localStorage
        try {
            const session = JSON.parse(localStorage.getItem('astro_session') || '{}');
            userId = session.userId;
        } catch (e) {
            console.error('Error getting session:', e);
        }

        // Register user
        if (userId) {
            socket.emit('register', { userId });
        }

        socket.on('connect', () => {
            console.log('Socket connected:', socket.id);
            if (userId) {
                socket.emit('register', { userId });
            }
        });

        function acceptCall() {
            ringtone.pause();
            document.getElementById('buttonsContainer').style.display = 'none';
            document.getElementById('connecting').classList.add('show');

            console.log('Accepting call - Session:', sessionId);

            socket.emit('answer-session-native', {
                sessionId: sessionId,
                accept: true,
                callType: callType
            }, (res) => {
                if (res && res.ok && res.fromUserId) {
                    console.log('Call accepted, redirecting to main app...');
                    // Redirect to main app with session info
                    window.location.href = '/?acceptedCall=' + sessionId +
                        '&fromUserId=' + res.fromUserId +
                        '&callType=' + callType;
                } else {
                    showError('Failed to connect: ' + (res ? res.error : 'Unknown error'));
                }
            });

            // Timeout after 10 seconds
            setTimeout(() => {
                if (document.getElementById('connecting').classList.contains('show')) {
                    showError('Connection timeout. Please try again.');
                }
            }, 10000);
        }

        function rejectCall() {
            ringtone.pause();
            console.log('Rejecting call - Session:', sessionId);

            socket.emit('answer-session-native', {
                sessionId: sessionId,
                accept: false
            });

            // Redirect to main app
            window.location.href = '/';
        }

        function showError(msg) {
            document.getElementById('connecting').classList.remove('show');
            document.getElementById('buttonsContainer').style.display = 'flex';
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorMsg').classList.add('show');
        }

        // Auto-play ringtone on user interaction
        document.body.addEventListener('click', () => {
            ringtone.play().catch(e => { });
        }, { once: true });

        // Handle page visibility
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                ringtone.play().catch(e => { });
            }
        });
    </script>
</body>

</html>
