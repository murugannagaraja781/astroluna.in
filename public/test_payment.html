<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhonePe Test Payment</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a0533, #2d1b69, #1a0533);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 0.5rem;
        }

        h1 {
            color: #c084fc;
            margin-bottom: 0.3rem;
            font-size: 1.5rem;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
        }

        input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: #a855f7;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(168, 85, 247, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #status {
            margin-top: 1.2rem;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            min-height: 24px;
            line-height: 1.5;
        }

        #status .success {
            color: #4ade80;
        }

        #status .error {
            color: #f87171;
        }

        #status .info {
            color: #60a5fa;
        }

        .response-box {
            margin-top: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 1rem;
            text-align: left;
            font-size: 0.75rem;
            color: #a5b4fc;
            font-family: monospace;
            max-height: 200px;
            overflow-y: auto;
            word-break: break-all;
            display: none;
        }

        .quick-amounts {
            display: flex;
            gap: 8px;
            margin-bottom: 1.2rem;
        }

        .quick-amounts button {
            flex: 1;
            padding: 0.5rem;
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            margin-top: 0;
        }

        .quick-amounts button:hover {
            background: rgba(168, 85, 247, 0.3);
            border-color: #a855f7;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">💳</div>
        <h1>PhonePe Payment Test</h1>
        <p class="subtitle">Standard Checkout v2</p>

        <div class="input-group">
            <label for="userId">User ID</label>
            <input type="text" id="userId" value="DEMO_USER_123" placeholder="Enter user ID">
        </div>
        <div class="input-group">
            <label for="amount">Amount (₹)</label>
            <input type="number" id="amount" value="1" min="1" placeholder="Enter amount">
        </div>

        <div class="quick-amounts">
            <button onclick="setAmount(1)">₹1</button>
            <button onclick="setAmount(10)">₹10</button>
            <button onclick="setAmount(50)">₹50</button>
            <button onclick="setAmount(100)">₹100</button>
        </div>

        <button id="payBtn" onclick="initiatePayment()">🔒 Pay Now</button>
        <div id="status"></div>
        <div id="responseBox" class="response-box"></div>
    </div>

    <script>
        function setAmount(val) {
            document.getElementById('amount').value = val;
        }

        async function initiatePayment() {
            const userId = document.getElementById('userId').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            const statusDiv = document.getElementById('status');
            const responseBox = document.getElementById('responseBox');
            const payBtn = document.getElementById('payBtn');

            if (!userId) {
                statusDiv.innerHTML = '<span class="error">❌ Enter a User ID</span>';
                return;
            }
            if (!amount || amount < 1) {
                statusDiv.innerHTML = '<span class="error">❌ Minimum amount is ₹1</span>';
                return;
            }

            statusDiv.innerHTML = '<span class="info">⏳ Creating payment...</span>';
            payBtn.disabled = true;
            responseBox.style.display = 'none';

            try {
                const response = await fetch('/api/payment/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, amount, isApp: false })
                });

                const result = await response.json();

                // Show raw response
                responseBox.textContent = JSON.stringify(result, null, 2);
                responseBox.style.display = 'block';

                if (result.ok && result.payload && result.payload.paymentUrl) {
                    statusDiv.innerHTML = '<span class="success">✅ Payment created! Redirecting to PhonePe...</span>';

                    // Redirect to PhonePe payment page after 1 second
                    setTimeout(() => {
                        window.location.href = result.payload.paymentUrl;
                    }, 1000);
                } else {
                    statusDiv.innerHTML = '<span class="error">❌ ' + (result.error || 'Payment creation failed') + '</span>';
                    payBtn.disabled = false;
                }
            } catch (err) {
                statusDiv.innerHTML = '<span class="error">❌ Network Error: ' + err.message + '</span>';
                responseBox.textContent = err.stack || err.message;
                responseBox.style.display = 'block';
                payBtn.disabled = false;
            }
        }
    </script>
</body>

</html>
