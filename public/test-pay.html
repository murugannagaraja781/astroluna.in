<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway Test | Astroluna</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Cinzel:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #050510;
            --accent: #F59E0B;
            --brand: #7C3AED;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 10% 10%, rgba(124, 58, 237, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(245, 158, 11, 0.1) 0%, transparent 40%);
        }

        .test-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 48px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .test-container::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(135deg, var(--brand), transparent, var(--accent));
            border-radius: 32px;
            z-index: -1;
            opacity: 0.3;
        }

        .icon {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 24px;
            filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.4));
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        p {
            color: #9CA3AF;
            margin-bottom: 32px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .amount-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--accent);
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 32px;
        }

        .amount {
            font-size: 3rem;
            font-weight: 800;
            color: white;
            display: block;
        }

        .amount-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            opacity: 0.8;
        }

        .pay-btn {
            width: 100%;
            padding: 20px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, var(--accent), #D97706);
            color: #000;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 15px 30px rgba(245, 158, 11, 0.2);
        }

        .pay-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(245, 158, 11, 0.4);
            filter: brightness(1.1);
        }

        .pay-btn:disabled {
            filter: grayscale(1);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .status {
            margin-top: 24px;
            font-size: 0.85rem;
            min-height: 1.2rem;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-top: 3px solid #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .footer-note {
            position: fixed;
            bottom: 24px;
            font-size: 0.75rem;
            color: #4B5563;
        }
    </style>
</head>

<body>

    <div class="test-container">
        <div class="icon"><i class="fas fa-microchip"></i></div>
        <h1>Gateway Diagnostic</h1>
        <p>You are about to run a live test transmission to PhonePe production cluster.</p>

        <div class="amount-card">
            <span class="amount-label">Test Amount</span>
            <span class="amount">₹1.00</span>
        </div>

        <button id="payBtn" class="pay-btn" onclick="startTest()">
            <span id="btnText">Initiate Test Payment</span>
            <div id="loader" class="loader"></div>
        </button>

        <div id="status" class="status"></div>
    </div>

    <div class="footer-note">
        Astroluna Payment Gateway Diagnostic Interface v1.2
    </div>

    <script>
        // Use a dummy user or prompt for ID if needed for the test
        const TEST_USER_ID = "test_diag_user_" + Math.floor(Math.random() * 1000);

        async function startTest() {
            const btn = document.getElementById('payBtn');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');
            const status = document.getElementById('status');

            btn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';
            status.style.color = '#9CA3AF';
            status.innerText = "Connecting to secure server...";

            try {
                const response = await fetch('/api/payment/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: TEST_USER_ID,
                        amount: 1, // 1 Rupee
                        isApp: false
                    })
                });

                let result;
                const contentType = response.headers.get("content-type");
                if (contentType && contentType.includes("application/json")) {
                    result = await response.json();
                } else {
                    const text = await response.text();
                    throw new Error(`Server returned non-JSON response: ${text.substring(0, 100)}...`);
                }

                if (result.ok && result.payload && result.payload.paymentUrl) {
                    status.style.color = '#10B981';
                    status.innerText = "Redirecting to PhonePe...";

                    setTimeout(() => {
                        window.location.href = result.payload.paymentUrl;
                    }, 1000);
                } else {
                    const errorMsg = result.error || result.message || (result.payload && result.payload.error) || "Initiation failed";
                    throw new Error(errorMsg);
                }
            } catch (err) {
                console.error("Diagnostic Error:", err);
                btn.disabled = false;
                btnText.style.display = 'block';
                loader.style.display = 'none';
                status.style.color = '#EF4444';
                status.innerText = "Error: " + err.message;
            }
        }
    </script>
</body>

</html>
