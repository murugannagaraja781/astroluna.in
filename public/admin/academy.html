<!DOCTYPE html>
<html lang="ta">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Academy - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .video-list {
            display: grid;
            gap: 15px;
        }

        .video-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background: #f8f9fa;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .video-item:hover {
            background: #f0f0f5;
        }

        .video-info {
            flex: 1;
        }

        .video-info h4 {
            color: #333;
            margin-bottom: 4px;
        }

        .video-info span {
            font-size: 12px;
            color: #888;
            background: #e0e0e0;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .video-info a {
            font-size: 12px;
            color: #667eea;
            text-decoration: none;
            margin-left: 10px;
        }

        .delete-btn {
            background: #ff5252;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            background: #ff1744;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        .alert-error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }

        .loader {
            text-align: center;
            padding: 20px;
            color: #888;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .card {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Astro Academy</h1>
            <p>வீடியோக்களை நிர்வகிக்கவும் / Manage Videos</p>
        </div>

        <div id="alert" class="alert"></div>

        <div class="card">
            <h2>➕ புதிய வீடியோ சேர்க்க</h2>
            <form id="addVideoForm">
                <div class="form-group">
                    <label>வீடியோ தலைப்பு / Title</label>
                    <input type="text" id="title" placeholder="உதா: ராசி பலன் அடிப்படைகள்" required>
                </div>
                <div class="form-group">
                    <label>YouTube லிங்க் / URL</label>
                    <input type="url" id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=..." required>
                </div>
                <div class="form-group">
                    <label>வகை / Category</label>
                    <select id="category">
                        <option value="Basics">அடிப்படை (Basics)</option>
                        <option value="Intermediate">இடைநிலை (Intermediate)</option>
                        <option value="Advanced">மேம்பட்ட (Advanced)</option>
                        <option value="Predictions">பலன்கள் (Predictions)</option>
                        <option value="General">பொது (General)</option>
                    </select>
                </div>
                <button type="submit" class="btn" id="submitBtn">
                    ✨ வீடியோ சேர்க்க / Add Video
                </button>
            </form>
        </div>

        <div class="card">
            <h2>📹 வீடியோ பட்டியல் / Video List</h2>
            <div id="videoList" class="video-list">
                <div class="loader">ஏற்றுகிறது... / Loading...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // Show alert
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            setTimeout(() => {
                alert.style.display = 'none';
            }, 4000);
        }

        // Load videos
        async function loadVideos() {
            const container = document.getElementById('videoList');
            try {
                const res = await fetch(`${API_BASE}/api/academy/videos`);
                const data = await res.json();

                if (data.ok && data.videos && data.videos.length > 0) {
                    container.innerHTML = data.videos.map(video => `
                        <div class="video-item">
                            <div class="video-info">
                                <h4>🎬 ${video.title}</h4>
                                <span>${video.category || 'General'}</span>
                                <a href="${video.youtubeUrl}" target="_blank">🔗 இணைப்பைப் பார்</a>
                            </div>
                            <button class="delete-btn" onclick="deleteVideo('${video._id}')">🗑️ நீக்கு</button>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                            </svg>
                            <p>இன்னும் வீடியோக்கள் இல்லை<br>No videos added yet</p>
                        </div>
                    `;
                }
            } catch (err) {
                container.innerHTML = `<div class="empty-state"><p>❌ ஏற்றுவதில் பிழை</p></div>`;
            }
        }

        // Add video
        document.getElementById('addVideoForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'சேர்க்கிறது...';

            const data = {
                title: document.getElementById('title').value,
                youtubeUrl: document.getElementById('youtubeUrl').value,
                category: document.getElementById('category').value
            };

            try {
                const res = await fetch(`${API_BASE}/api/admin/academy/videos`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (result.ok) {
                    showAlert('✅ வீடியோ வெற்றிகரமாக சேர்க்கப்பட்டது!', 'success');
                    document.getElementById('addVideoForm').reset();
                    loadVideos();
                } else {
                    showAlert('❌ பிழை: ' + result.error, 'error');
                }
            } catch (err) {
                showAlert('❌ சர்வர் பிழை', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '✨ வீடியோ சேர்க்க / Add Video';
            }
        });

        // Delete video
        async function deleteVideo(id) {
            if (!confirm('இந்த வீடியோவை நீக்க விரும்புகிறீர்களா?')) return;

            try {
                const res = await fetch(`${API_BASE}/api/admin/academy/videos/${id}`, {
                    method: 'DELETE'
                });

                const result = await res.json();

                if (result.ok) {
                    showAlert('🗑️ வீடியோ நீக்கப்பட்டது', 'success');
                    loadVideos();
                } else {
                    showAlert('❌ நீக்குவதில் பிழை', 'error');
                }
            } catch (err) {
                showAlert('❌ சர்வர் பிழை', 'error');
            }
        }

        // Initial load
        loadVideos();
    </script>
</body>

</html>
